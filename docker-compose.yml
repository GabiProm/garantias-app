services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: garantias_sql_local
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_Strong_Password123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  backend:
    container_name: garantias_api_local
    build:
      context: ./Garantias.API
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      APPLY_MIGRATIONS: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GarantiasDb;User Id=sa;Password=Your_Strong_Password123!;TrustServerCertificate=True;Encrypt=False;"
    ports:
      - "5177:8080"
    depends_on:
      - sqlserver

  frontend:
    container_name: garantias_frontend_local
    build:
      context: ./garantias-frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:5177/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  sqlserver_data: