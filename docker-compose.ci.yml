services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: garantias_sql_ci
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_Strong_Password123!"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  backend:
    container_name: garantias_api_ci
    build:
      context: ./Garantias.API
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      APPLY_MIGRATIONS: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GarantiasDb;User Id=sa;Password=Your_Strong_Password123!;TrustServerCertificate=True;Encrypt=False;"
    ports:
      - "5177:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    container_name: garantias_frontend_ci
    build:
      context: ./garantias-frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:5177/api
    ports:
      - "5173:5173"
    depends_on:
      - backend