name: QA Docker Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  qa-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo integrador
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: GabiProm/garantias-frontend
          path: garantias-frontend

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: GabiProm/garantias-api
          path: Garantias.API

      - name: Checkout QA
        uses: actions/checkout@v4
        with:
          repository: GabiProm/garantias-qa
          path: garantias-qa

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install QA dependencies
        working-directory: garantias-qa
        run: npm ci

      - name: Install Playwright browsers
        working-directory: garantias-qa
        run: npx playwright install --with-deps

      - name: Install Newman
        run: npm install -g newman

      - name: Start application with Docker Compose
        run: docker compose -f docker-compose.ci.yml up -d --build

      - name: Show Docker containers
        run: docker ps -a

      - name: Wait for Backend
        run: |
          echo "Esperando Backend..."
          for i in {1..60}; do
            if curl -fsS http://localhost:5177/api/tickets; then
              echo "Backend listo"
              exit 0
            fi
            echo "Backend aún no disponible..."
            sleep 5
          done
          echo "Backend no inició correctamente"
          docker compose -f docker-compose.ci.yml logs backend
          docker compose -f docker-compose.ci.yml logs sqlserver
          exit 1

      - name: Wait for Frontend
        run: |
          echo "Esperando Frontend..."
          for i in {1..60}; do
            if curl -fsS http://localhost:5173; then
              echo "Frontend listo"
              exit 0
            fi
            echo "Frontend aún no disponible..."
            sleep 5
          done
          echo "Frontend no inició correctamente"
          docker compose -f docker-compose.ci.yml logs frontend
          exit 1

      - name: Run Newman API tests
        working-directory: garantias-qa
        run: |
          newman run postman/Garantias_API.postman_collection.json \
          -e postman/STM_Local_Docker.postman_environment.json

      - name: Run Playwright regression tests
        working-directory: garantias-qa
        run: npm run regression

      - name: Generate QA dashboard history
        if: always()
        working-directory: garantias-qa
        run: npm run history

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: garantias-qa/playwright-report/
          retention-days: 30

      - name: Upload QA Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: |
            garantias-qa/reports/
            garantias-qa/qa-dashboard/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: garantias-qa/test-results/
          retention-days: 30

      - name: Stop Docker Compose
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v